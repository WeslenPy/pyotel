server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "127.0.0.1:4417"
        http:
          endpoint: "127.0.0.1:4418"

ingester:
  trace_idle_period: 1s
  max_block_duration: 1s
  flush_check_period: 1s
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    min_ready_duration: 1s

memberlist:
  bind_addr: [127.0.0.1]
  bind_port: 7947

query_frontend:
  mcp_server:
    enabled: true

querier:
  frontend_worker:
    frontend_address: 127.0.0.1:9096

storage:
  trace:
    backend: local
    wal:
      path: /data/tempo/wal
    local:
      path: /data/tempo/blocks

compactor:
  retention_period: 24h

backend_scheduler:
  work:
    prune_age: 1h
    dead_job_timeout: 24h
  maintenance_interval: 1m
  backend_flush_interval: 1m
  provider:
    retention:
      interval: 1h
    compaction:
      measure_interval: 1m
      max_jobs_per_tenant: 1000
      min_input_blocks: 2
      max_input_blocks: 4
      max_compaction_level: 0
      min_cycle_interval: 30s
  job_timeout: 15s
  local_work_path: /var/tempo
metrics_generator:
  processor:
    local_blocks:
      filter_server_spans: false
    span_metrics:
      dimensions:
        - service_name
        - operation
        - status_code
  traces_storage:
    path: /data/tempo/generator/traces
  storage:
    path: /data/tempo/generator/wal
    remote_write:
      - url: http://127.0.0.1:9090/api/v1/write
        send_exemplars: true


overrides:
  metrics_generator_processors: [service-graphs, local-blocks, span-metrics]